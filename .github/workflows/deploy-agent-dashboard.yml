name: Deploy Agent Dashboard

on:
  push:
    branches: [ 'main' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies (server)
        run: |
          cd projects/agent-dashboard
          npm ci
      - name: Copy agent-dashboard to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: "projects/agent-dashboard/*"
          target: "${{ secrets.DEPLOY_PATH }}/"
      - name: Install & restart on remote
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"/projects/agent-dashboard
            # ensure pm2 is installed
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi
            npm ci --production
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js --update-env
