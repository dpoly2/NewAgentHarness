version: '3.8'

# Quick local WordPress testing environment for PBS Event Commerce plugin.
# Usage:
#   docker compose up -d
#   Open http://localhost:8080  (WP admin: admin / password)
#   Plugin is auto-mounted; activate it from WP Admin → Plugins.
#
# Stripe/Square/PayPal webhook testing:
#   Install the Stripe CLI: stripe listen --forward-to localhost:8080/wp-json/pbs-ec/v1/webhooks/stripe
#   Square: use ngrok + Square Sandbox webhook settings

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.5-php8.2-apache
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
    volumes:
      # Mount the plugin directly — no need to re-zip on every change
      - ./plugin/pbs-event-commerce:/var/www/html/wp-content/plugins/pbs-event-commerce
      - wp_data:/var/www/html

  # WP-CLI container for one-off setup commands
  wpcli:
    image: wordpress:cli-php8.2
    depends_on:
      - wordpress
    volumes:
      - wp_data:/var/www/html
      - ./plugin/pbs-event-commerce:/var/www/html/wp-content/plugins/pbs-event-commerce
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
    entrypoint: wp
    command: --info

volumes:
  db_data:
  wp_data:
