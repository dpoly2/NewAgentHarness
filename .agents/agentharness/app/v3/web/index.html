<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchonHub v1.0.0</title>
    <link rel="icon" type="image/x-icon" href="/web/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/web/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/web/favicon-512.png" />
    <style>
        :root {
            --bg: #0B0F17;
            --bg-card: #111827;
            --bg-panel: #0A1F44;
            --accent: #00B8FF;
            --accent-light: #2DD4FF;
            --text: #D9E3F0;
            --text-body: #D9E3F0;
            --text-muted: #8899aa;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #1e3a5f;
            --shadow: 0 18px 36px rgba(0,0,0,0.28);
            --radius: 16px;
            --sidebar-desktop: 220px;
            --sidebar-collapsed: 56px;
        }
        * { box-sizing: border-box; }
        html, body { width: 100%; }
        body {
            background: radial-gradient(circle at top right, rgba(0,184,255,0.12), transparent 28%), var(--bg);
            color: var(--text);
            font-family: Inter, 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }
        button, input, select, textarea { font: inherit; }
        button { cursor: pointer; }
        a { color: inherit; text-decoration: none; }
        .hidden { display: none !important; }
        .app-shell { height: 100vh; width: 100%; }
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-desktop);
            background: linear-gradient(180deg, rgba(10,31,68,0.96), rgba(17,24,39,0.98));
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 40;
            transition: width 0.25s ease, transform 0.25s ease;
            box-shadow: var(--shadow);
        }
        body.sidebar-collapsed #sidebar { width: var(--sidebar-collapsed); }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 16px;
            gap: 12px;
            min-height: 74px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .brand-mark {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: #04121f;
            font-weight: 900;
            display: grid;
            place-items: center;
            box-shadow: 0 10px 28px rgba(0,184,255,0.28);
            flex: 0 0 auto;
        }
        .brand-copy { min-width: 0; }
        .brand-copy h1 {
            margin: 0;
            font-size: 16px;
            line-height: 1.1;
            color: var(--accent-light);
            white-space: nowrap;
        }
        .brand-copy p {
            margin: 3px 0 0;
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .collapse-btn,
        .mobile-menu-btn,
        .ghost-btn,
        .icon-btn,
        .action-btn,
        .danger-btn,
        .success-btn,
        .secondary-btn {
            border: 1px solid rgba(45,212,255,0.16);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .collapse-btn:hover,
        .mobile-menu-btn:hover,
        .ghost-btn:hover,
        .icon-btn:hover,
        .action-btn:hover,
        .secondary-btn:hover {
            border-color: rgba(45,212,255,0.45);
            background: rgba(45,212,255,0.08);
        }
        .danger-btn { border-color: rgba(239,68,68,0.22); color: #fecaca; }
        .danger-btn:hover { border-color: rgba(239,68,68,0.48); background: rgba(239,68,68,0.12); }
        .success-btn { border-color: rgba(34,197,94,0.24); color: #bbf7d0; }
        .success-btn:hover { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.12); }
        .collapse-btn, .icon-btn {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
        }
        .mobile-menu-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 55;
            width: 40px;
            height: 40px;
            display: none;
            place-items: center;
            backdrop-filter: blur(12px);
        }
        .sidebar-nav {
            padding: 12px 10px;
            overflow: auto;
            flex: 1;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 12px;
            border-radius: 14px;
            color: var(--text-body);
            margin-bottom: 6px;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: rgba(45,212,255,0.06); border-color: rgba(45,212,255,0.16); }
        .nav-item.active {
            background: rgba(0,184,255,0.14);
            border-color: rgba(45,212,255,0.42);
            color: var(--accent-light);
            box-shadow: inset 0 0 0 1px rgba(45,212,255,0.12);
        }
        .nav-icon { width: 22px; text-align: center; flex: 0 0 22px; font-size: 15px; }
        .nav-label,
        .brand-copy,
        .sidebar-user-copy,
        .sidebar-status-copy { transition: opacity 0.2s ease; }
        body.sidebar-collapsed .nav-label,
        body.sidebar-collapsed .brand-copy,
        body.sidebar-collapsed .sidebar-user-copy,
        body.sidebar-collapsed .sidebar-status-copy {
            opacity: 0;
            width: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .sidebar-footer {
            padding: 14px 10px 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: grid;
            gap: 10px;
        }
        .sidebar-user,
        .sidebar-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 10px 12px;
            min-width: 0;
        }
        .avatar-dot,
        .status-dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 10px; }
        .avatar-dot {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            box-shadow: 0 0 0 4px rgba(45,212,255,0.12);
        }
        .status-dot.online { background: var(--success); }
        .status-dot.offline { background: var(--error); }
        .status-dot.connecting { background: var(--warning); }
        .sidebar-user-copy,
        .sidebar-status-copy { min-width: 0; }
        .sidebar-user-copy strong,
        .sidebar-status-copy strong { display: block; font-size: 13px; }
        .sidebar-user-copy span,
        .sidebar-status-copy span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #sidebarBackdrop {
            position: fixed;
            inset: 0;
            background: rgba(4,11,23,0.72);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 35;
        }
        body.mobile-nav-open #sidebarBackdrop { opacity: 1; pointer-events: auto; }
        #main {
            position: relative;
            height: 100vh;
            margin-left: var(--sidebar-desktop);
            transition: margin-left 0.25s ease;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        body.sidebar-collapsed #main { margin-left: var(--sidebar-collapsed); }
        body.logged-out #main { margin-left: 0; }
        #content { flex: 1; overflow: auto; padding: 28px; }
        .status-bar {
            height: 46px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(11,15,23,0.92);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 20px;
            backdrop-filter: blur(12px);
            font-size: 13px;
            color: var(--text-muted);
        }
        .status-group {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            color: var(--text-body);
            white-space: nowrap;
        }
        .page-shell,
        .section-stack,
        .list-stack,
        .card-grid,
        .notification-list,
        .progress-list { display: grid; gap: 18px; }
        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .page-title h2 {
            margin: 0;
            font-size: 28px;
            letter-spacing: -0.02em;
        }
        .page-title p { margin: 6px 0 0; color: var(--text-muted); font-size: 14px; }
        .header-actions, .toolbar, .form-actions, .table-actions, .chip-row, .tag-row, .meta-row, .status-row, .top-summary {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-btn, .danger-btn, .success-btn, .secondary-btn, .ghost-btn {
            padding: 10px 14px;
            min-height: 40px;
        }
        .action-btn {
            background: linear-gradient(135deg, rgba(0,184,255,0.18), rgba(45,212,255,0.08));
            border-color: rgba(45,212,255,0.35);
            color: var(--accent-light);
        }
        .action-btn:hover { box-shadow: 0 10px 24px rgba(0,184,255,0.14); }
        .card,
        .panel,
        .table-wrap,
        .login-card,
        .chat-shell,
        .stat-card,
        .list-card,
        .briefing-card,
        .form-card,
        .modal-card {
            background: linear-gradient(180deg, rgba(17,24,39,0.98), rgba(10,16,29,0.98));
            border: 1px solid rgba(30,58,95,0.95);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .card, .panel, .form-card, .briefing-card, .list-card, .table-wrap, .chat-shell { padding: 18px; }
        .form-card h3, .panel h3, .card h3, .briefing-card h3, .list-card h3, .table-wrap h3 { margin: 0 0 14px; font-size: 16px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 16px;
        }
        .stat-card { padding: 18px; display: grid; gap: 10px; }
        .stat-label { font-size: 13px; color: var(--text-muted); }
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.03em;
        }
        .stat-meta { font-size: 12px; color: var(--text-muted); }
        .dashboard-grid, .split-grid, .content-grid { display: grid; gap: 18px; }
        .dashboard-grid { grid-template-columns: 1.8fr 1fr; }
        .split-grid { grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.9fr); }
        .content-grid.cards-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .content-grid.cards-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .toolbar { align-items: flex-end; }
        .toolbar .field,
        .form-grid .field,
        .inline-form .field { display: grid; gap: 8px; min-width: 0; }
        .field label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        input, select, textarea {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(45,212,255,0.14);
            background: rgba(4,11,23,0.82);
            color: var(--text);
            padding: 11px 12px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        textarea { min-height: 110px; resize: vertical; }
        input:focus, select:focus, textarea:focus {
            border-color: rgba(45,212,255,0.5);
            box-shadow: 0 0 0 4px rgba(0,184,255,0.12);
        }
        .form-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .form-grid .span-2 { grid-column: span 2; }
        .form-actions { justify-content: flex-end; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: left;
            vertical-align: middle;
            font-size: 13px;
        }
        th {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        tr:hover td { background: rgba(45,212,255,0.03); }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(45,212,255,0.08);
            color: var(--accent-light);
            border: 1px solid rgba(45,212,255,0.2);
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
        }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
        .muted { color: var(--text-muted); }
        .card-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
        .entity-card {
            padding: 18px;
            border-radius: var(--radius);
            border: 1px solid rgba(30,58,95,0.95);
            background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(8,13,24,0.96));
            box-shadow: var(--shadow);
            display: grid;
            gap: 12px;
        }
        .entity-card.clickable { cursor: pointer; }
        .entity-card.clickable:hover { border-color: rgba(45,212,255,0.34); transform: translateY(-1px); }
        .entity-card h4 { margin: 0; font-size: 17px; }
        .entity-card p { margin: 0; font-size: 13px; color: var(--text-muted); }
        .progress-track {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
        }
        .notif-item, .progress-item, .summary-item {
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.03);
        }
        .summary-item strong, .notif-item strong, .progress-item strong { display: block; margin-bottom: 4px; font-size: 13px; }
        .summary-item span, .notif-item span, .progress-item span { display: block; font-size: 12px; color: var(--text-muted); }
        .empty-state, .loading-state {
            padding: 40px 18px;
            text-align: center;
            color: var(--text-muted);
            border: 1px dashed rgba(45,212,255,0.18);
            border-radius: var(--radius);
            background: rgba(45,212,255,0.04);
        }
        .empty-state strong, .loading-state strong { display: block; color: var(--text); margin-bottom: 6px; font-size: 16px; }
        .login-screen {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .login-card { width: min(440px, 100%); padding: 28px; display: grid; gap: 18px; }
        .login-logo {
            display: grid;
            gap: 8px;
            justify-items: center;
            text-align: center;
            margin-bottom: 4px;
        }
        .login-logo .brand-mark {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            font-size: 20px;
        }
        .login-logo h2 {
            margin: 0;
            color: var(--accent-light);
            font-size: 34px;
            line-height: 1;
            letter-spacing: -0.04em;
        }
        .login-logo p { margin: 0; color: var(--text-muted); }
        .error-banner, .success-banner, .info-banner {
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13px;
        }
        .error-banner {
            background: rgba(239,68,68,0.12);
            color: #fecaca;
            border: 1px solid rgba(239,68,68,0.24);
        }
        .success-banner {
            background: rgba(34,197,94,0.12);
            color: #bbf7d0;
            border: 1px solid rgba(34,197,94,0.24);
        }
        .info-banner {
            background: rgba(0,184,255,0.1);
            color: #bae6fd;
            border: 1px solid rgba(0,184,255,0.2);
        }
        .briefing-text {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 14px;
            color: var(--text-body);
            background: rgba(4,11,23,0.58);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 18px;
        }
        .chat-shell {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 0;
            padding: 0;
            overflow: hidden;
            min-height: calc(100vh - 156px);
        }
        .chat-sidebar {
            border-right: 1px solid rgba(255,255,255,0.06);
            padding: 18px;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 14px;
            min-height: 0;
        }
        .chat-list { overflow: auto; display: grid; gap: 10px; }
        .chat-convo {
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.03);
            padding: 12px 14px;
            cursor: pointer;
        }
        .chat-convo.active { border-color: rgba(45,212,255,0.38); background: rgba(45,212,255,0.09); }
        .chat-main { display: grid; grid-template-rows: auto 1fr auto; min-height: 0; }
        .chat-header {
            padding: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .chat-messages {
            padding: 20px;
            overflow: auto;
            display: grid;
            align-content: start;
            gap: 12px;
            background: radial-gradient(circle at top, rgba(45,212,255,0.04), transparent 24%);
        }
        .bubble {
            max-width: min(72%, 720px);
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            line-height: 1.55;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .bubble.agent { justify-self: start; background: rgba(255,255,255,0.05); }
        .bubble.user { justify-self: end; background: rgba(0,184,255,0.12); border-color: rgba(45,212,255,0.24); }
        .bubble small { display: block; margin-top: 8px; color: var(--text-muted); font-size: 11px; }
        .chat-input {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: end;
        }
        .chat-input textarea { min-height: 52px; max-height: 160px; }
        .modal-root {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 70;
            background: rgba(3,8,16,0.74);
            backdrop-filter: blur(6px);
        }
        .modal-root.open { display: flex; }
        .modal-card {
            width: min(760px, 100%);
            max-height: min(90vh, 860px);
            overflow: auto;
            padding: 22px;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }
        .modal-header h3 { margin: 0; font-size: 20px; }
        .toast-container {
            position: fixed;
            right: 18px;
            bottom: 18px;
            display: grid;
            gap: 10px;
            z-index: 85;
        }
        .toast {
            min-width: 260px;
            max-width: 360px;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text);
            background: rgba(17,24,39,0.97);
            box-shadow: var(--shadow);
            animation: toastIn 0.22s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast strong { display: block; margin-bottom: 4px; font-size: 13px; }
        .toast span { font-size: 13px; color: var(--text-body); }
        .kpi-inline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--text-body);
            font-size: 13px;
        }
        @media (max-width: 1200px) {
            .stats-grid, .content-grid.cards-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .dashboard-grid, .split-grid, .content-grid.cards-2 { grid-template-columns: 1fr; }
        }
        @media (max-width: 960px) {
            .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .form-grid { grid-template-columns: 1fr; }
            .form-grid .span-2 { grid-column: span 1; }
            .chat-shell { grid-template-columns: 1fr; min-height: auto; }
            .chat-sidebar { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
        }
        @media (max-width: 760px) {
            .mobile-menu-btn { display: grid; }
            #sidebar { transform: translateX(-100%); width: min(320px, 86vw); }
            body.mobile-nav-open #sidebar { transform: translateX(0); }
            body.sidebar-collapsed #sidebar { width: min(320px, 86vw); }
            #main, body.sidebar-collapsed #main { margin-left: 0; }
            #content { padding: 68px 16px 16px; }
            .status-bar {
                flex-direction: column;
                height: auto;
                align-items: flex-start;
                padding: 10px 16px;
            }
            .status-group { width: 100%; flex-wrap: wrap; }
            .page-header { align-items: stretch; }
            .header-actions, .toolbar, .form-actions, .table-actions { width: 100%; }
            .header-actions > *, .toolbar > *, .form-actions > * { flex: 1 1 100%; }
            .stats-grid { grid-template-columns: 1fr; }
            th:nth-child(n+5), td:nth-child(n+5) { display: none; }
        }
    </style>
</head>
<body class="sidebar-expanded">
    <button class="mobile-menu-btn hidden" id="mobileMenuBtn" aria-label="Open navigation">☰</button>
    <div id="sidebarBackdrop"></div>
    <div class="app-shell" id="appShell">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <img src="/web/logo.svg" alt="ArchonHub" style="height:32px;width:auto;flex-shrink:0;" onerror="this.style.display='none';document.getElementById('brandMarkFallback').style.display='flex';" />
                    <div class="brand-mark" id="brandMarkFallback" style="display:none">AH</div>
                    <div class="brand-copy">
                        <h1>ArchonHub</h1>
                        <p>v1.0.0 · Control Surface</p>
                    </div>
                </div>
                <button class="collapse-btn" id="collapseBtn" aria-label="Toggle sidebar">☰</button>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar-dot"></div>
                    <div class="sidebar-user-copy">
                        <strong id="sidebarUsername">Guest</strong>
                        <span id="sidebarRole">Authentication required</span>
                    </div>
                </div>
                <div class="sidebar-status">
                    <div class="status-dot offline" id="sidebarWsDot"></div>
                    <div class="sidebar-status-copy">
                        <strong id="sidebarHubLabel">Hub Offline</strong>
                        <span id="sidebarWsLabel">WebSocket disconnected</span>
                    </div>
                </div>
            </div>
        </aside>
        <main id="main">
            <div id="content"></div>
            <div class="status-bar hidden" id="statusBar">
                <div class="status-group">
                    <div class="status-pill"><span class="status-dot offline" id="hubDot"></span><span id="hubLabel">Hub Offline</span></div>
                    <div class="status-pill"><span class="status-dot offline" id="wsDot"></span><span id="wsLabel">WebSocket disconnected</span></div>
                </div>
                <div class="status-group">
                    <div class="status-pill">User: <strong id="statusUsername">Guest</strong></div>
                    <div class="status-pill">Page: <strong id="statusPage">Login</strong></div>
                </div>
            </div>
        </main>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="modal-root" id="modalRoot"></div>

    <script>
        const API_BASE = '';
        const APP_VERSION = 'v1.0.0';
        const navItems = [
            { id: 'dashboard', icon: '🏠', label: 'Dashboard' },
            { id: 'runs', icon: '▶', label: 'Runs' },
            { id: 'queue', icon: '⏳', label: 'Queue' },
            { id: 'todos', icon: '📋', label: 'Todos' },
            { id: 'schedule', icon: '📅', label: 'Schedule' },
            { id: 'clients', icon: '👥', label: 'Clients' },
            { id: 'projects', icon: '📁', label: 'Projects' },
            { id: 'connectors', icon: '✉', label: 'Connectors' },
            { id: 'travel', icon: '✈', label: 'Travel' },
            { id: 'briefing', icon: '📰', label: 'Briefing' },
            { id: 'chat', icon: '💬', label: 'Chat' },
            { id: 'settings', icon: '⚙', label: 'Settings' }
        ];

        const state = {
            currentPage: 'login',
            pageTimer: null,
            wsReconnectTimer: null,
            healthPulseTimer: null,
            runsFilters: { agent_id: '', project: '', status: '' },
            todos: [],
            todoFilters: { priority: 'all', status: 'all', project: 'all' },
            scheduler: [],
            clients: [],
            projects: [],
            connectors: [],
            trips: [],
            briefing: null,
            conversations: [],
            messages: [],
            currentConversationId: null,
            notifications: [],
            runProgress: {},
            mobileNavOpen: false,
            hubOnline: false,
            wsState: 'offline',
            health: null
        };

        let ws = null;

        const $ = (selector, root = document) => root.querySelector(selector);
        const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function decodeToken(token) {
            try {
                const payload = token.split('.')[1];
                if (!payload) return null;
                return JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
            } catch {
                return null;
            }
        }

        function getToken() {
            return localStorage.getItem('archon_token') || '';
        }

        function getStoredUser() {
            try {
                return JSON.parse(localStorage.getItem('archon_user') || 'null');
            } catch {
                return null;
            }
        }

        function setStoredUser(user) {
            if (user) localStorage.setItem('archon_user', JSON.stringify(user));
        }

        function isTokenExpired(token = getToken()) {
            if (!token) return true;
            const decoded = decodeToken(token);
            if (!decoded || !decoded.exp) return false;
            return (decoded.exp * 1000) <= Date.now();
        }

        function isAuthenticated() {
            return !!getToken() && !isTokenExpired();
        }

        function currentUser() {
            const stored = getStoredUser();
            if (stored?.username) return stored;
            const decoded = decodeToken(getToken());
            return decoded ? { username: decoded.sub || decoded.username || 'user', role: decoded.role || 'user' } : null;
        }

        function setShellVisibility(isAuth) {
            $('#sidebar').classList.toggle('hidden', !isAuth);
            $('#statusBar').classList.toggle('hidden', !isAuth);
            $('#mobileMenuBtn').classList.toggle('hidden', !isAuth);
            document.body.classList.toggle('logged-out', !isAuth);
            if (!isAuth) closeMobileNav();
        }

        function updateUserUI() {
            const user = currentUser();
            const name = user?.username || 'Guest';
            const role = user?.role || 'Authentication required';
            $('#sidebarUsername').textContent = name;
            $('#sidebarRole').textContent = role;
            $('#statusUsername').textContent = name;
        }

        function setStatusPage(page) {
            $('#statusPage').textContent = page.charAt(0).toUpperCase() + page.slice(1);
        }

        function setHubStatus(online, text = online ? 'Hub Online' : 'Hub Offline') {
            state.hubOnline = !!online;
            const dotClass = online ? 'online' : 'offline';
            $('#hubDot').className = `status-dot ${dotClass}`;
            $('#hubLabel').textContent = text;
            $('#sidebarHubLabel').textContent = text;
        }

        function setWSState(kind, text) {
            state.wsState = kind;
            const dotClass = kind === 'online' ? 'online' : kind === 'connecting' ? 'connecting' : 'offline';
            $('#wsDot').className = `status-dot ${dotClass}`;
            $('#wsLabel').textContent = text;
            $('#sidebarWsDot').className = `status-dot ${dotClass}`;
            $('#sidebarWsLabel').textContent = text;
        }

        function shortId(value, size = 10) {
            const str = String(value || '—');
            return str.length > size ? `${str.slice(0, size)}…` : str;
        }

        function fmtDate(value) {
            if (!value) return '—';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return escapeHtml(value);
            return date.toLocaleDateString();
        }

        function fmtDateTime(value) {
            if (!value) return '—';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return escapeHtml(value);
            return date.toLocaleString();
        }

        function fmtRelative(value) {
            if (!value) return '—';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return escapeHtml(value);
            const diff = Date.now() - date.getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        function money(value) {
            const num = Number(value || 0);
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);
        }

        function pct(value) {
            const num = Number(value || 0);
            return `${Math.round(num * 100)}%`;
        }

        function badge(text, color) {
            return `<span style="background:${color}22;color:${color};padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">${escapeHtml(text)}</span>`;
        }

        function statusColor(status) {
            const map = {
                active: 'var(--success)',
                online: 'var(--success)',
                connected: 'var(--success)',
                running: 'var(--accent)',
                queued: 'var(--warning)',
                pending: 'var(--warning)',
                planning: 'var(--warning)',
                completed: 'var(--success)',
                done: 'var(--success)',
                success: 'var(--success)',
                in_progress: 'var(--accent-light)',
                paused: 'var(--warning)',
                draft: 'var(--text-muted)',
                inactive: 'var(--text-muted)',
                offline: 'var(--error)',
                failed: 'var(--error)',
                cancelled: 'var(--error)',
                canceled: 'var(--error)',
                prospect: 'var(--accent)'
            };
            return map[String(status || '').toLowerCase()] || 'var(--text-muted)';
        }

        function priorityColor(priority) {
            const map = {
                urgent: 'var(--error)',
                high: 'var(--warning)',
                medium: 'var(--accent)',
                low: 'var(--success)',
                normal: 'var(--text-muted)'
            };
            return map[String(priority || '').toLowerCase()] || 'var(--text-muted)';
        }

        function scoreBadge(score) {
            const num = Number(score || 0);
            const color = num >= 0.75 ? 'var(--success)' : num >= 0.5 ? 'var(--warning)' : 'var(--error)';
            return badge(pct(num), color);
        }

        function asArray(data, fallbackKeys = []) {
            if (Array.isArray(data)) return data;
            if (!data || typeof data !== 'object') return [];
            const keys = ['items', 'data', ...fallbackKeys];
            for (const key of keys) {
                if (Array.isArray(data[key])) return data[key];
            }
            const firstArray = Object.values(data).find(Array.isArray);
            return firstArray || [];
        }

        function buildQuery(path, params = {}) {
            const qs = new URLSearchParams();
            Object.entries(params).forEach(([key, value]) => {
                if (value !== null && value !== undefined && value !== '' && value !== 'all') qs.append(key, value);
            });
            const query = qs.toString();
            return query ? `${path}?${query}` : path;
        }

        async function api(method, path, body = null) {
            const opts = {
                method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API_BASE + path, opts);
            if (res.status === 401) { logout(); return null; }
            const text = await res.text();
            if (!res.ok) throw new Error(text || `${res.status} ${res.statusText}`);
            if (!text) return null;
            try {
                return JSON.parse(text);
            } catch {
                return text;
            }
        }

        async function apiFallback(calls) {
            let lastError = null;
            for (const [method, path, body] of calls) {
                try {
                    return await api(method, path, body ?? null);
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error('Request failed');
        }

        function showToast(text, color = 'var(--accent)') {
            const container = $('#toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeft = `4px solid ${color}`;
            toast.innerHTML = `<strong>ArchonHub</strong><span>${escapeHtml(text)}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.2s ease';
                setTimeout(() => toast.remove(), 220);
            }, 4000);
        }

        function setLoading(title = 'Loading', message = 'Fetching live hub data…') {
            $('#content').innerHTML = `<div class="loading-state"><strong>${escapeHtml(title)}</strong><span>${escapeHtml(message)}</span></div>`;
        }

        function emptyState(title, message) {
            return `<div class="empty-state"><strong>${escapeHtml(title)}</strong><span>${escapeHtml(message)}</span></div>`;
        }

        function renderShell(title, subtitle, body, actions = '') {
            $('#content').innerHTML = `
                <div class="page-shell">
                    <div class="page-header">
                        <div class="page-title">
                            <h2>${escapeHtml(title)}</h2>
                            <p>${escapeHtml(subtitle)}</p>
                        </div>
                        <div class="header-actions">${actions}</div>
                    </div>
                    ${body}
                </div>
            `;
        }

        function openModal(title, content) {
            const modalRoot = $('#modalRoot');
            modalRoot.innerHTML = `
                <div class="modal-card">
                    <div class="modal-header">
                        <h3>${escapeHtml(title)}</h3>
                        <button class="icon-btn" id="modalCloseBtn" aria-label="Close modal">✕</button>
                    </div>
                    ${content}
                </div>
            `;
            modalRoot.classList.add('open');
            $('#modalCloseBtn').addEventListener('click', closeModal);
            modalRoot.onclick = (event) => {
                if (event.target === modalRoot) closeModal();
            };
        }

        function closeModal() {
            const modalRoot = $('#modalRoot');
            modalRoot.classList.remove('open');
            modalRoot.innerHTML = '';
        }

        function renderSidebar() {
            $('#sidebarNav').innerHTML = navItems.map((item) => `
                <button class="nav-item ${state.currentPage === item.id ? 'active' : ''}" data-page="${item.id}">
                    <span class="nav-icon">${item.icon}</span>
                    <span class="nav-label">${escapeHtml(item.label)}</span>
                </button>
            `).join('') + `
                <button class="nav-item" id="logoutNavBtn">
                    <span class="nav-icon">⇦</span>
                    <span class="nav-label">Logout</span>
                </button>
            `;
            $$('.nav-item[data-page]').forEach((button) => {
                button.addEventListener('click', () => navigate(button.dataset.page));
            });
            $('#logoutNavBtn')?.addEventListener('click', logout);
        }

        function setRefresh(callback, ms) {
            clearRefresh();
            state.pageTimer = setInterval(callback, ms);
        }

        function clearRefresh() {
            if (state.pageTimer) clearInterval(state.pageTimer);
            state.pageTimer = null;
        }

        async function refreshHubPulse() {
            if (!isAuthenticated()) return;
            try {
                const health = await api('GET', '/api/health');
                if (!health) return;
                state.health = health;
                setHubStatus(String(health.status || '').toLowerCase() !== 'offline', String(health.status || '').toLowerCase() === 'offline' ? 'Hub Offline' : 'Hub Online');
            } catch {
                setHubStatus(false, 'Hub Offline');
            }
        }

        function connectWS() {
            if (!isAuthenticated()) return;
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
            clearTimeout(state.wsReconnectTimer);
            setWSState('connecting', 'WebSocket connecting');
            ws = new WebSocket(`ws://${location.host}/ws`);
            ws.onopen = () => {
                setWSState('online', 'WebSocket connected');
                ws.send(JSON.stringify({ type: 'auth', token: getToken() }));
            };
            ws.onmessage = (e) => {
                try {
                    handleWSEvent(JSON.parse(e.data));
                } catch {
                    showToast('Received malformed WebSocket event', 'var(--warning)');
                }
            };
            ws.onclose = () => {
                setWSState('offline', 'WebSocket disconnected');
                clearTimeout(state.wsReconnectTimer);
                state.wsReconnectTimer = setTimeout(connectWS, 5000);
            };
            ws.onerror = () => {
                setWSState('offline', 'WebSocket error');
            };
        }

        function updateRunProgress(event) {
            const runId = event.run_id || event.job_id || 'unknown';
            state.runProgress[runId] = {
                run_id: runId,
                node: event.node || event.step || event.stage || 'running',
                text: event.text || event.message || 'Progress update received',
                updated_at: event.updated_at || new Date().toISOString(),
                progress: Number(event.progress ?? 0)
            };
            const container = $('#runProgressList');
            if (container) {
                container.innerHTML = Object.values(state.runProgress).slice(0, 6).map((item) => `
                    <div class="progress-item">
                        <strong>${escapeHtml(shortId(item.run_id, 14))} · ${escapeHtml(item.node)}</strong>
                        <span>${escapeHtml(item.text)} · ${fmtRelative(item.updated_at)}</span>
                        <div class="progress-track" style="margin-top:10px"><div class="progress-bar" style="width:${Math.max(8, Math.min(100, Math.round((item.progress || 0) * 100)))}%"></div></div>
                    </div>
                `).join('') || emptyState('No active node updates', 'Live run progress will appear here.');
            }
        }

        function handleChatWS(event) {
            const conversationId = event.conversation_id || event.id;
            const message = event.message || event.data || event.payload;
            if (!conversationId || !message) return;
            if (state.currentConversationId === conversationId) {
                const normalized = typeof message === 'string'
                    ? { role: event.role || 'agent', content: message, created_at: event.created_at || new Date().toISOString(), agent_id: event.agent_id || '' }
                    : message;
                state.messages = [...state.messages, normalized];
                renderMessages();
            }
        }

        function handleWSEvent(event) {
            if (event.type === 'node_update') { updateRunProgress(event); }
            if (event.type === 'todo_update') { if (state.currentPage === 'todos') showTodos(); }
            if (event.type === 'notif') {
                state.notifications = [{ text: event.text, color: event.color, created_at: new Date().toISOString() }, ...state.notifications].slice(0, 10);
                showToast(event.text, event.color || 'var(--accent)');
            }
            if (event.type === 'run_completed') { if (state.currentPage === 'runs') showRuns(); }
            if (event.type === 'run_started' && state.currentPage === 'runs') showRuns();
            if (event.type === 'run_failed' && state.currentPage === 'runs') showRuns();
            if (event.type === 'run_cancelled' && state.currentPage === 'runs') showRuns();
            if (event.type === 'run_completed' && state.currentPage === 'dashboard') showDashboard();
            if (event.type === 'briefing_ready' && state.currentPage === 'briefing') showBriefing();
            if (['message', 'chat_message', 'conversation_message'].includes(event.type)) handleChatWS(event);
        }

        function closeMobileNav() {
            state.mobileNavOpen = false;
            document.body.classList.remove('mobile-nav-open');
        }

        function openMobileNav() {
            state.mobileNavOpen = true;
            document.body.classList.add('mobile-nav-open');
        }

        function logout() {
            localStorage.removeItem('archon_token');
            localStorage.removeItem('archon_user');
            clearRefresh();
            if (ws) {
                try { ws.close(); } catch {}
            }
            ws = null;
            setHubStatus(false, 'Hub Offline');
            setWSState('offline', 'WebSocket disconnected');
            navigate('login', true);
        }

        async function navigate(page, replaceHash = false) {
            clearRefresh();
            closeMobileNav();
            state.currentPage = page;
            setStatusPage(page);
            renderSidebar();
            if (page !== 'login' && !isAuthenticated()) {
                await showLogin();
                return;
            }
            if (page !== 'login') {
                setShellVisibility(true);
                connectWS();
            }
            const route = `#/${page}`;
            if (location.hash !== route) {
                if (replaceHash) history.replaceState(null, '', route); else location.hash = route;
            }
            const pages = {
                login: showLogin,
                dashboard: showDashboard,
                runs: showRuns,
                queue: showQueue,
                todos: showTodos,
                schedule: showSchedule,
                clients: showClients,
                projects: showProjects,
                connectors: showConnectors,
                travel: showTravel,
                briefing: showBriefing,
                chat: showChat,
                settings: showSettings
            };
            const fn = pages[page] || showDashboard;
            await fn();
        }

        async function requireAuth() {
            if (!isAuthenticated()) {
                await navigate('login', true);
                return false;
            }
            return true;
        }

        function statCard(label, value, meta) {
            return `
                <div class="stat-card">
                    <div class="stat-label">${escapeHtml(label)}</div>
                    <div class="stat-value">${escapeHtml(String(value ?? '0'))}</div>
                    <div class="stat-meta">${escapeHtml(meta)}</div>
                </div>
            `;
        }

        function runRow(run) {
            const runId = run.run_id || run.id || '—';
            return `
                <tr>
                    <td class="mono" title="${escapeHtml(runId)}">${escapeHtml(shortId(runId, 12))}</td>
                    <td>${escapeHtml(run.agent_id || '—')}</td>
                    <td>${escapeHtml(run.project || '—')}</td>
                    <td>${escapeHtml(run.graph || run.graph_type || '—')}</td>
                    <td>${scoreBadge(run.score)}</td>
                    <td>${badge(run.status || 'unknown', statusColor(run.status))}</td>
                    <td>${fmtDateTime(run.created_at)}</td>
                </tr>
            `;
        }

        async function showLogin() {
            state.currentPage = 'login';
            renderSidebar();
            setStatusPage('login');
            setShellVisibility(false);
            $('#content').innerHTML = `
                <div class="login-screen">
                    <div class="login-card">
                        <div class="login-logo">
                            <div class="brand-mark">AH</div>
                            <h2>ArchonHub</h2>
                            <p>v1.0.0 · Agent orchestration hub</p>
                        </div>
                        <div class="info-banner">Connect to the ArchonHub FastAPI server on localhost:8765.</div>
                        <form id="loginForm" class="section-stack">
                            <div class="field">
                                <label for="loginUsername">Username</label>
                                <input id="loginUsername" name="username" autocomplete="username" required />
                            </div>
                            <div class="field">
                                <label for="loginPassword">Password</label>
                                <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
                            </div>
                            <div id="loginError"></div>
                            <button class="action-btn" type="submit">Sign In</button>
                        </form>
                    </div>
                </div>
            `;
            $('#loginForm').addEventListener('submit', async (event) => {
                event.preventDefault();
                const form = new FormData(event.currentTarget);
                const payload = { username: form.get('username'), password: form.get('password') };
                $('#loginError').innerHTML = '';
                try {
                    const result = await fetch(API_BASE + '/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const text = await result.text();
                    const data = text ? JSON.parse(text) : {};
                    if (!result.ok) throw new Error(data.detail || data.message || text || 'Login failed');
                    localStorage.setItem('archon_token', data.access_token || data.token || '');
                    setStoredUser(data.user || { username: payload.username, role: 'user' });
                    updateUserUI();
                    showToast(`Welcome back, ${payload.username}`, 'var(--success)');
                    await navigate('dashboard', true);
                } catch (error) {
                    $('#loginError').innerHTML = `<div class="error-banner">${escapeHtml(error.message || 'Login failed')}</div>`;
                }
            });
        }

        async function showDashboard() {
            if (!(await requireAuth())) return;
            setLoading('Dashboard', 'Gathering health, runs, and notifications…');
            try {
                const [health, runsResponse, notificationsResponse] = await Promise.all([
                    api('GET', '/api/health'),
                    api('GET', '/api/runs?limit=5'),
                    api('GET', '/api/notifications')
                ]);
                state.health = health;
                const runs = asArray(runsResponse, ['runs']).slice(0, 5);

        function normalizeTags(tags) {
            if (Array.isArray(tags)) return tags;
            if (!tags) return [];
            try {
                const parsed = JSON.parse(tags);
                return Array.isArray(parsed) ? parsed : String(tags).split(',').map((item) => item.trim()).filter(Boolean);
            } catch {
                return String(tags).split(',').map((item) => item.trim()).filter(Boolean);
            }
        }

        function normalizeTagString(value) {
            return JSON.stringify(String(value || '').split(',').map((item) => item.trim()).filter(Boolean));
        }
