                renderShell(
                    'Briefing',
                    'View the latest generated portfolio briefing.',
                    `
                        <div class="briefing-card">
                            <h3>Daily Briefing</h3>
                            <div class="meta-row muted" style="margin-bottom:14px">Last updated: ${fmtDateTime(updated)}</div>
                            <div class="briefing-text">${escapeHtml(content)}</div>
                        </div>
                    `,
                    `<button class="action-btn" id="refreshBriefingBtn">Refresh</button>`
                );
                $('#refreshBriefingBtn').addEventListener('click', showBriefing);
            } catch (error) {
                renderShell('Briefing', 'View the latest generated portfolio briefing.', `<div class="error-banner">${escapeHtml(error.message || 'Unable to load briefing')}</div>`);
            }
        }

        function renderMessagesMarkup() {
            if (!state.currentConversationId) return emptyState('No conversation selected', 'Create or select a conversation to see messages.');
            if (!state.messages.length) return emptyState('No messages yet', 'Send the first message to start the conversation.');
            return state.messages.map((message) => {
                const role = message.role === 'user' ? 'user' : 'agent';
                return `
                    <div class="bubble ${role}">
                        ${escapeHtml(message.content || '')}
                        <small>${escapeHtml(role === 'user' ? 'You' : (message.agent_id || 'Agent'))} · ${fmtDateTime(message.created_at)}</small>
                    </div>
                `;
            }).join('');
        }

        function renderMessages() {
            const container = $('#chatMessages');
            if (!container) return;
            container.innerHTML = renderMessagesMarkup();
            scrollChatToBottom();
        }

        function scrollChatToBottom() {
            const container = $('#chatMessages');
            if (container) container.scrollTop = container.scrollHeight;
        }

        function openConversationModal() {
            openModal('New Conversation', `
                <form id="newConversationForm" class="form-grid">
                    <div class="field span-2"><label>Title</label><input name="title" required /></div>
                    <div class="field span-2"><label>Slug</label><input name="slug" placeholder="optional-slug" /></div>
                    <div class="form-actions span-2">
                        <button class="secondary-btn" type="button" id="closeConversationModalBtn">Close</button>
                        <button class="action-btn" type="submit">Create Conversation</button>
                    </div>
                </form>
            `);
            $('#closeConversationModalBtn').addEventListener('click', closeModal);
            $('#newConversationForm').addEventListener('submit', async (event) => {
                event.preventDefault();
                try {
                    const created = await api('POST', '/api/conversations', Object.fromEntries(new FormData(event.currentTarget).entries()));
                    state.currentConversationId = created?.id || created?.conversation_id || state.currentConversationId;
                    closeModal();
                    showToast('Conversation created', 'var(--success)');
                    showChat();
                } catch (error) {
                    showToast(error.message || 'Unable to create conversation', 'var(--error)');
                }
            });
        }

        async function showChat() {
            if (!(await requireAuth())) return;
            setLoading('Chat', 'Loading conversations…');
            try {
                const convoResponse = await api('GET', '/api/conversations');
                state.conversations = asArray(convoResponse, ['conversations']);
                if (!state.currentConversationId && state.conversations.length) state.currentConversationId = state.conversations[0].id;
                if (state.currentConversationId) {
                    const msgResponse = await api('GET', `/api/conversations/${encodeURIComponent(state.currentConversationId)}/messages`);
                    state.messages = asArray(msgResponse, ['messages']);
                } else {
                    state.messages = [];
                }
                renderShell(
                    'Chat',
                    'Collaborate with agents in real time.',
                    `
                        <div class="chat-shell">
                            <div class="chat-sidebar">
                                <div class="toolbar">
                                    <button class="action-btn" id="newConversationBtn">New Conversation</button>
                                </div>
                                <div class="chat-list" id="chatList">
                                    ${state.conversations.length ? state.conversations.map((conversation) => `
                                        <div class="chat-convo ${conversation.id === state.currentConversationId ? 'active' : ''}" data-id="${escapeHtml(conversation.id)}">
                                            <strong>${escapeHtml(conversation.title || 'Untitled Conversation')}</strong>
                                            <div class="muted">${fmtRelative(conversation.updated_at || conversation.created_at)}</div>
                                        </div>
                                    `).join('') : emptyState('No conversations', 'Create a conversation to start chatting.')}
                                </div>
                            </div>
                            <div class="chat-main">
                                <div class="chat-header">
                                    <div>
                                        <strong>${escapeHtml(state.conversations.find((item) => item.id === state.currentConversationId)?.title || 'No conversation selected')}</strong>
                                        <div class="muted">Real-time updates sync through WebSocket.</div>
                                    </div>
                                    <div class="chip-row">
                                        <span class="chip">${escapeHtml(state.currentConversationId || 'None')}</span>
                                    </div>
                                </div>
                                <div class="chat-messages" id="chatMessages">${renderMessagesMarkup()}</div>
                                <form class="chat-input" id="chatForm">
                                    <textarea id="chatMessageInput" placeholder="Send a message to ArchonHub…" ${state.currentConversationId ? '' : 'disabled'}></textarea>
                                    <button class="action-btn" type="submit" ${state.currentConversationId ? '' : 'disabled'}>Send</button>
                                </form>
                            </div>
                        </div>
                    `,
                    `<button class="action-btn" id="chatRefreshBtn">Refresh Chat</button>`
                );
                $('#chatRefreshBtn').addEventListener('click', showChat);
                $('#newConversationBtn').addEventListener('click', openConversationModal);
                $$('.chat-convo').forEach((item) => item.addEventListener('click', async () => {
                    state.currentConversationId = item.dataset.id;
                    await showChat();
                }));
                $('#chatForm').addEventListener('submit', async (event) => {
                    event.preventDefault();
                    const input = $('#chatMessageInput');
                    const content = input.value.trim();
                    if (!content || !state.currentConversationId) return;
                    try {
                        await api('POST', `/api/conversations/${encodeURIComponent(state.currentConversationId)}/messages`, { role: 'user', content });
                        input.value = '';
                        await showChat();
                    } catch (error) {
                        showToast(error.message || 'Unable to send message', 'var(--error)');
                    }
                });
                requestAnimationFrame(scrollChatToBottom);
            } catch (error) {
                renderShell('Chat', 'Collaborate with agents in real time.', `<div class="error-banner">${escapeHtml(error.message || 'Unable to load chat')}</div>`);
            }
        }

        async function showSchedule() {
            if (!(await requireAuth())) return;
            setLoading('Schedule', 'Loading scheduled jobs…');
            try {
                const response = await api('GET', '/api/scheduler');
                state.scheduler = asArray(response, ['jobs', 'scheduler']);
                renderShell(
                    'Schedule',
                    'Inspect built-in jobs and manage user-defined automations.',
                    `
                        <div class="split-grid">
                            <div class="table-wrap">
                                <h3>Scheduled Jobs</h3>
                                ${state.scheduler.length ? `
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Job ID</th>
                                                <th>Agent</th>
                                                <th>Project</th>
                                                <th>Type</th>
                                                <th>Schedule</th>
                                                <th>Next Fire</th>
                                                <th>Status</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${state.scheduler.map((job) => {
                                                const type = job.run_type || (job.interval_sec ? 'interval' : 'cron');
                                                const schedule = type === 'interval' ? `${job.interval_sec || '—'}s` : (job.cron_expr || job.schedule || '—');
                                                const isBuiltin = !job.user_defined && ['daily_briefing', 'daily_reflexion', 'grant_research_sweep', 'hutto_planning_monitor', 'weekly_fare_alert', 'sigma_signal_check', 'nightly_db_cleanup'].includes(job.id || job.job_id);
                                                return `
                                                    <tr>
                                                        <td class="mono">${escapeHtml(job.id || job.job_id || '—')}</td>
                                                        <td>${escapeHtml(job.agent_id || 'system')}</td>
                                                        <td>${escapeHtml(job.project || '—')}</td>
                                                        <td>${badge(type, type === 'interval' ? 'var(--warning)' : 'var(--accent)')}</td>
                                                        <td>${escapeHtml(schedule)}</td>
                                                        <td>${fmtDateTime(job.next_fire || job.next_run_time)}</td>
                                                        <td>${badge(job.status || 'active', statusColor(job.status || 'active'))}</td>
                                                        <td>
                                                            <div class="table-actions">
                                                                ${isBuiltin ? `<button class="secondary-btn trigger-job-btn" data-id="${escapeHtml(job.id || job.job_id)}">Trigger Now</button>` : `<button class="danger-btn delete-schedule-btn" data-id="${escapeHtml(job.id || job.job_id)}">Delete</button>`}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                ` : emptyState('No scheduled jobs', 'Built-in and user jobs will appear here.')}
                            </div>
                            <div class="form-card">
                                <h3>Add Job</h3>
                                <form id="addScheduleForm" class="form-grid">
                                    <div class="field">
                                        <label>Job ID</label>
                                        <input name="id" required />
                                    </div>
                                    <div class="field">
                                        <label>Agent</label>
                                        <input name="agent_id" required />
                                    </div>
                                    <div class="field">
                                        <label>Project</label>
                                        <input name="project" />
                                    </div>
                                    <div class="field">
                                        <label>Type</label>
                                        <select name="run_type" id="jobTypeSelect">
                                            <option value="cron">cron</option>
                                            <option value="interval">interval</option>
                                        </select>
                                    </div>
                                    <div class="field span-2">
                                        <label>Task</label>
                                        <textarea name="task"></textarea>
                                    </div>
                                    <div class="field" id="cronField">
                                        <label>Cron Expression</label>
                                        <input name="cron_expr" placeholder="0 7 * * 1-5" />
                                    </div>
                                    <div class="field" id="intervalField">
                                        <label>Interval Seconds</label>
                                        <input name="interval_sec" type="number" min="30" value="3600" />
                                    </div>
                                    <div class="field span-2">
                                        <label>Graph</label>
                                        <select name="graph">
                                            ${['reflexion', 'research', 'wordpress', 'business-law'].map((item) => `<option value="${item}">${item}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div class="form-actions span-2">
                                        <button class="action-btn" type="submit">Add Job</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    `,
                    `<button class="action-btn" id="scheduleRefreshBtn">Refresh Schedule</button>`
                );
                $('#scheduleRefreshBtn').addEventListener('click', showSchedule);
                const syncScheduleType = () => {
                    const interval = $('#jobTypeSelect').value === 'interval';
                    $('#cronField').classList.toggle('hidden', interval);
                    $('#intervalField').classList.toggle('hidden', !interval);
                };
                syncScheduleType();
                $('#jobTypeSelect').addEventListener('change', syncScheduleType);
                $('#addScheduleForm').addEventListener('submit', async (event) => {
                    event.preventDefault();
                    const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
                    if (payload.run_type === 'interval' && payload.interval_sec) payload.interval_sec = Number(payload.interval_sec);
                    try {
                        await api('POST', '/api/scheduler', payload);
                        showToast('Scheduled job created', 'var(--success)');
                        showSchedule();
                    } catch (error) {
                        showToast(error.message || 'Unable to create scheduled job', 'var(--error)');
                    }
                });
                $$('.trigger-job-btn').forEach((button) => button.addEventListener('click', async () => {
                    try {
                        await apiFallback([
                            ['POST', `/api/scheduler/${encodeURIComponent(button.dataset.id)}/trigger`],
                            ['POST', `/api/scheduler/${encodeURIComponent(button.dataset.id)}/run`]
                        ]);
                        showToast('Job trigger requested', 'var(--success)');
                    } catch (error) {
                        showToast(error.message || 'Unable to trigger job', 'var(--error)');
                    }
                }));
                $$('.delete-schedule-btn').forEach((button) => button.addEventListener('click', async () => {
                    if (!confirm('Delete this scheduled job?')) return;
                    try {
                        await api('DELETE', `/api/scheduler/${encodeURIComponent(button.dataset.id)}`);
                        showToast('Scheduled job deleted', 'var(--warning)');
                        showSchedule();
                    } catch (error) {
                        showToast(error.message || 'Unable to delete job', 'var(--error)');
                    }
                }));
            } catch (error) {
                renderShell('Schedule', 'Inspect built-in jobs and manage user-defined automations.', `<div class="error-banner">${escapeHtml(error.message || 'Unable to load scheduler')}</div>`);
            }
        }

        async function showSettings() {
            if (!(await requireAuth())) return;
            setLoading('Settings', 'Loading admin configuration…');
            try {
                const [config, usersResponse] = await Promise.all([
                    api('GET', '/api/config'),
                    api('GET', '/api/users')
                ]);
                const users = asArray(usersResponse, ['users']);
                renderShell(
                    'Settings',
                    'Admin controls for hub configuration and user access.',
                    `
                        <div class="split-grid">
                            <div class="section-stack">
                                <div class="form-card">
                                    <h3>Hub Config</h3>
                                    <form id="configForm" class="form-grid">
                                        <div class="field">
                                            <label>LLM Model</label>
                                            <select name="llm_model">
                                                ${['gpt-4o', 'gpt-4o-mini', 'gpt-4-turbo', 'claude-3-5-sonnet'].map((item) => `<option value="${item}" ${(config?.llm_model || config?.OPENAI_MODEL || 'gpt-4o-mini') === item ? 'selected' : ''}>${item}</option>`).join('')}
                                            </select>
                                        </div>
                                        <div class="field">
                                            <label>Thread Pool Size</label>
                                            <input name="thread_pool_size" type="number" min="1" max="16" value="${escapeHtml(String(config?.thread_pool_size || config?.thread_pool || 3))}" />
                                        </div>
                                        <div class="field span-2">
                                            <label>API Token</label>
                                            <input name="api_token" value="${escapeHtml(config?.api_token || '••••••••••••••••')}" readonly />
                                        </div>
                                        <div class="form-actions span-2">
                                            <button class="action-btn" type="submit">Save Config</button>
                                        </div>
                                    </form>
                                </div>
                                <div class="form-card">
                                    <h3>Change Password</h3>
                                    <form id="changePasswordForm" class="form-grid">
                                        <div class="field"><label>Current Password</label><input name="current_password" type="password" required /></div>
                                        <div class="field"><label>New Password</label><input name="new_password" type="password" required /></div>
                                        <div class="field span-2"><label>Confirm Password</label><input name="confirm_password" type="password" required /></div>
                                        <div class="form-actions span-2"><button class="action-btn" type="submit">Change Password</button></div>
                                    </form>
                                </div>
                            </div>
                            <div class="table-wrap">
                                <h3>User Management</h3>
                                ${users.length ? `
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Username</th>
                                                <th>Email</th>
                                                <th>Role</th>
                                                <th>Active</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${users.map((user) => `
                                                <tr>
                                                    <td>${escapeHtml(user.username || '—')}</td>
                                                    <td>${escapeHtml(user.email || '—')}</td>
                                                    <td>${badge(user.role || 'user', user.role === 'admin' ? 'var(--accent)' : 'var(--text-muted)')}</td>
                                                    <td>${badge(user.is_active ? 'active' : 'disabled', user.is_active ? 'var(--success)' : 'var(--error)')}</td>
                                                    <td>
                                                        <div class="table-actions">
                                                            <button class="secondary-btn toggle-user-btn" data-id="${escapeHtml(String(user.id))}" data-active="${user.is_active ? '1' : '0'}">${user.is_active ? 'Disable' : 'Enable'}</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                ` : emptyState('No users found', 'User records will appear here for admin management.')}
                            </div>
                        </div>
                    `,
                    `<button class="action-btn" id="settingsRefreshBtn">Refresh Settings</button>`
                );
                $('#settingsRefreshBtn').addEventListener('click', showSettings);
                $('#configForm').addEventListener('submit', async (event) => {
                    event.preventDefault();
                    const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
                    payload.thread_pool_size = Number(payload.thread_pool_size || 3);
                    try {
                        await api('PUT', '/api/config', payload);
                        showToast('Configuration updated', 'var(--success)');
                    } catch (error) {
                        showToast(error.message || 'Unable to save config', 'var(--error)');
                    }
                });
                $('#changePasswordForm').addEventListener('submit', async (event) => {
                    event.preventDefault();
                    const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
                    if (payload.new_password !== payload.confirm_password) {
                        showToast('New password confirmation does not match', 'var(--warning)');
                        return;
                    }
                    delete payload.confirm_password;
                    try {
                        await apiFallback([
                            ['POST', '/api/auth/change-password', payload],
                            ['POST', '/api/users/change-password', payload]
                        ]);
                        showToast('Password changed', 'var(--success)');
                        event.currentTarget.reset();
                    } catch (error) {
                        showToast(error.message || 'Unable to change password', 'var(--error)');
                    }
                });
                $$('.toggle-user-btn').forEach((button) => button.addEventListener('click', async () => {
                    try {
                        await api('PUT', `/api/users/${encodeURIComponent(button.dataset.id)}`, { is_active: button.dataset.active !== '1' });
                        showToast('User status updated', 'var(--success)');
                        showSettings();
                    } catch (error) {
                        showToast(error.message || 'Unable to update user', 'var(--error)');
                    }
                }));
            } catch (error) {
                renderShell('Settings', 'Admin controls for hub configuration and user access.', `<div class="error-banner">${escapeHtml(error.message || 'Unable to load settings')}</div>`);
            }
        }

        async function bootstrapAuth() {
            updateUserUI();
            if (!isAuthenticated()) {
                await showLogin();
                return;
            }
            try {
                const me = await api('GET', '/api/auth/me');
                if (me) setStoredUser(me);
                updateUserUI();
                await refreshHubPulse();
                connectWS();
                const page = (location.hash || '#/dashboard').replace(/^#\//, '') || 'dashboard';
                await navigate(page, true);
            } catch {
                logout();
            }
        }

        window.addEventListener('hashchange', () => {
            const page = (location.hash || '#/dashboard').replace(/^#\//, '') || 'dashboard';
            if (page !== state.currentPage) navigate(page, true);
        });

        $('#collapseBtn').addEventListener('click', () => {
            if (window.innerWidth <= 760) {
                state.mobileNavOpen ? closeMobileNav() : openMobileNav();
            } else {
                document.body.classList.toggle('sidebar-collapsed');
            }
        });
        $('#mobileMenuBtn').addEventListener('click', () => state.mobileNavOpen ? closeMobileNav() : openMobileNav());
        $('#sidebarBackdrop').addEventListener('click', closeMobileNav);
        window.addEventListener('resize', () => { if (window.innerWidth > 760) closeMobileNav(); });

        renderSidebar();
        updateUserUI();
        setHubStatus(false, 'Hub Offline');
        setWSState('offline', 'WebSocket disconnected');
        if (!state.healthPulseTimer) state.healthPulseTimer = setInterval(refreshHubPulse, 30000);
        bootstrapAuth();
    </script>
</body>
</html>
